<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Care Receipt</title>
  <style>
    body {font-family: Arial, sans-serif; background:#111; color:#fff; padding:20px;}
    .container {max-width:600px; margin:auto;}
    label {display:block; margin-top:10px;}
    select, button {width:100%; padding:8px; margin-top:8px; background:#2a2a2a; border:none; color:#fff;}
    .primary-btn {background:#ff0000; color:#fff; border-radius:4px; cursor:pointer;}
    .secondary-btn {background:#555; color:#fff; border-radius:4px; cursor:pointer;}
    table {width:100%; border-collapse:collapse; color:#fff;}
    th, td {padding:4px; border-bottom:1px solid #555;}
    #result {margin-top:15px; max-height:300px; overflow:auto; background:#111; padding:10px; border-radius:4px; display:none;}
  </style>
</head>
<body>
  <div class="container">
    <h2>Emergency Care Receipt</h2>
    <label>Device SIM (Donor ID):</label>
    <select id="emergencySimSelect"><option value="">Select device</option></select>
    <span id="simStatus" style="font-size:12px;color:var(--muted);margin-left:5px;"></span>
    <label>Time Range:</label>
    <select id="emergencyRange">
      <option value="this_week">This Week</option>
      <option value="last_week">Last Week</option>
      <option value="all">All Weeks</option>
    </select>
    <button id="fetchBtn" class="primary-btn">Get Receipt</button>
    <div id="result"></div>
    <div style="margin-top:10px; text-align:right;">
      <button id="printBtn" class="primary-btn" style="display:none;">Print</button>
    </div>
  </div>
<script src="emergency_care.js"></script>
</body>
</html>
