<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Records - HELP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #FF2D3B;
      --bg: #0A0A0F;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --text: #F2F2F5;
      --muted: rgba(242,242,245,0.45);
      --cyan: #00E5FF;
      --green: #00FF88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      max-width: 420px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .container {
      padding: 20px 24px;
      padding-bottom: 100px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--cyan);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--muted);
    }

    .info-value {
      font-weight: 600;
      color: var(--text);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.blood {
      background: rgba(255, 45, 59, 0.2);
      color: var(--red);
    }

    .badge.organ {
      background: rgba(0, 229, 255, 0.2);
      color: var(--cyan);
    }

    .history-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-type {
      font-weight: 600;
      color: var(--cyan);
    }

    .history-date {
      font-size: 11px;
      color: var(--muted);
    }

    .history-details {
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 24px;
      z-index: 50;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 0;
    }

    .nav-item.active .nav-icon {
      color: var(--red);
    }

    .nav-icon {
      font-size: 22px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-item.active .nav-label {
      color: var(--red);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="window.location.href='index.html'">←</div>
  <h1>My Records</h1>
</div>

<div class="container">
  <div id="recordsContent">
    <div class="loading">
      <div style="font-size: 24px; margin-bottom: 16px;">⏳</div>
      <div>Loading your records...</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item" onclick="navTo('index')">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </div>
  <div class="nav-item" onclick="navTo('map')">
    <div class="nav-icon">📍</div>
    <div class="nav-label">Map</div>
  </div>
  <div class="nav-item active" onclick="navTo('records')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">Records</div>
  </div>
  <div class="nav-item" onclick="navTo('settings')">
    <div class="nav-icon">⚙️</div>
    <div class="nav-label">Settings</div>
  </div>
</nav>

<script>
  const API_BASES = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
    ? ['http://localhost:3001', 'http://localhost:3000']
    : [''];

  async function fetchWithFallback(path, options = {}) {
    let lastError;
    for (const base of API_BASES) {
      const url = base ? `${base}${path}` : path;
      try {
        const res = await fetch(url, options);
        if (res.ok) {
          return res;
        }
        lastError = new Error(`HTTP ${res.status}`);
      } catch (err) {
        lastError = err;
      }
    }
    throw lastError;
  }

  function renderAccountPrompt() {
    const savedEmail = localStorage.getItem('userEmail') || localStorage.getItem('email') || '';
    const savedPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || '';

    document.getElementById('recordsContent').innerHTML = `
      <div class="card">
        <div class="card-title">Find Your Records</div>
        <div class="info-row" style="flex-direction:column; align-items:start; gap:10px;">
          <span class="info-label">Enter the email or phone number used in your donor registration.</span>
          <input id="recordEmail" type="email" placeholder="Email address" value="${savedEmail}" style="width:100%; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:var(--text); font-size:14px;" />
          <input id="recordPhone" type="tel" placeholder="Phone number" value="${savedPhone}" style="width:100%; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:var(--text); font-size:14px;" />
          <button onclick="saveAccountLookup()" style="width:100%; margin-top:8px; background:var(--red); color:white; border:none; border-radius:12px; padding:12px 0; cursor:pointer; font-weight:700;">Search My Records</button>
        </div>
      </div>
      <div class="card" style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);">
        <div class="info-row" style="flex-direction:column; align-items:start; gap:6px;">
          <span class="info-label">Detected stored account</span>
          <span class="info-value">Email: ${savedEmail || 'not set'}</span>
          <span class="info-value">Phone: ${savedPhone || 'not set'}</span>
        </div>
      </div>
    `;
  }

  function saveAccountLookup() {
    const emailInput = document.getElementById('recordEmail');
    const phoneInput = document.getElementById('recordPhone');
    const email = emailInput ? emailInput.value.trim() : '';
    const phone = phoneInput ? phoneInput.value.trim() : '';

    if (!email && !phone) {
      alert('Please enter your registered email or phone number to find donor records.');
      return;
    }

    if (email) localStorage.setItem('userEmail', email);
    if (phone) localStorage.setItem('userPhone', phone);
    localStorage.removeItem('userId');
    loadRecords();
  }

  async function loadRecords() {
    let userId = localStorage.getItem('userId') || '';
    let email = localStorage.getItem('userEmail') || localStorage.getItem('email') || '';
    let phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || '';

    // Fallback to bhm_reg_list if primary values are missing
    if (!email && !phone && !userId) {
      try {
        const regList = JSON.parse(localStorage.getItem('bhm_reg_list') || '[]');
        if (regList && regList.length > 0) {
          const latest = regList[regList.length - 1];
          email = latest.email || '';
          phone = latest.phone || '';
          userId = latest.donorId || '';
        }
      } catch (e) { console.warn('bhm_reg_list parse error', e); }
    }

    if (!email && !phone && !userId) {
      return renderAccountPrompt();
    }

    console.log('Records Debug:', { userId, email, phone });

    // ALWAYS try email/phone match FIRST — this queries the Neon DB donors table
    let foundDonor = null;
    let foundDonors = [];
    
    if (email || phone) {
      try {
        const params = new URLSearchParams();
        if (email) params.set('email', email);
        if (phone) params.set('phone', String(phone));
        console.log('Fetching by-account:', params.toString());
        const res = await fetchWithFallback(`/api/donors/by-account?` + params.toString(), { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          console.log('by-account response:', data);
          if (data.donors && data.donors.length > 0) {
            foundDonors = data.donors;
          }
        }
      } catch (e) { 
        console.warn('by-account fetch failed', e); 
      }
    }

    // Fallback: try by specific donorId if we have one and haven't found a donor yet
    if (foundDonors.length === 0 && userId) {
      try {
        const res = await fetchWithFallback(`/api/donor/${userId}`, { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          if (data.donor) {
            foundDonors = [data.donor];
          }
        }
      } catch (err) {
        console.warn('Donor ID fetch failed', err);
      }
    }

    let connectionFailed = false;

    // Ultimate Fallback: Fetch ALL donors and match locally if backend filters are failing
    if (foundDonors.length === 0 && (email || phone)) {
      try {
        console.log('Ultimate fallback: fetching all donors to find match locally');
        const res = await fetchWithFallback(`/api/donors`, { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          const allDonors = data.donors || [];
          const emailQ = String(email).toLowerCase().trim();
          const phoneQ = String(phone).replace(/\D/g, '').slice(-10);
          
          foundDonors = allDonors.filter(d => {
            const dEmail = (d.email || '').toLowerCase().trim();
            const dPhone = String(d.phone || '').replace(/\D/g, '').slice(-10);
            return (emailQ && dEmail === emailQ) || (phoneQ && dPhone === phoneQ);
          });
          console.log('Local fallback matched:', foundDonors.length);
        } else {
          connectionFailed = true;
        }
      } catch (e) {
        console.warn('Ultimate fallback failed', e);
        connectionFailed = true;
      }
    }

    if (foundDonors.length === 1) {
      return displayRecords(foundDonors[0]);
    } else if (foundDonors.length > 1) {
      return displayMultipleRecords(foundDonors);
    }

    // Nothing found — show appropriate message
    if (email || phone || userId) {
      document.getElementById('recordsContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${connectionFailed ? '⚠️' : '📝'}</div>
          <div>${connectionFailed ? 'Cannot connect to database server' : 'No donor records matched your email or phone.'}</div>
          <div style="font-size: 12px; margin-top: 10px; color: var(--muted);">
            Account email: <strong>${email || 'not set'}</strong><br>
            Account phone: <strong>${phone || 'not set'}</strong><br>
            <span style="margin-top:8px;display:block;">
              ${connectionFailed 
                ? 'Your backend server might be offline. Ensure Node.js is running if you are testing locally.' 
                : 'Try again with the email or phone number you used during donor registration, or update them in <a href="settings.html" style="color:var(--red);">Settings</a>.'}
            </span>
          </div>
        </div>
      `;
    } else {
      // Not logged in at all
      document.getElementById('recordsContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔐</div>
          <div>Please log in to view your records</div>
          <div style="margin-top: 20px;">
            <a href="form.html" style="color: var(--red); text-decoration: none;">Register / Login</a>
          </div>
        </div>
      `;
    }
  }

  function displayRecords(donor) {
    const donatedCount = donor.donated_count || 0;
    const receivedCount = donor.received_count || 0;
    
    let donatedDetail = [];
    try {
      donatedDetail = donor.donated_detail ? (typeof donor.donated_detail === 'string' && donor.donated_detail.startsWith('[') ? JSON.parse(donor.donated_detail) : [{notes: donor.donated_detail}]) : [];
    } catch(e) { donatedDetail = [{notes: donor.donated_detail}]; }
    
    let receivedDetail = [];
    try {
      receivedDetail = donor.received_detail ? (typeof donor.received_detail === 'string' && donor.received_detail.startsWith('[') ? JSON.parse(donor.received_detail) : [{notes: donor.received_detail}]) : [];
    } catch(e) { receivedDetail = [{notes: donor.received_detail}]; }

    let html = `
      <!-- Donor Info Card -->
      <div class="card">
        <div class="card-title">Donor Information</div>
        <div class="info-row">
          <span class="info-label">Reference ID</span>
          <span class="info-value" style="color: var(--cyan); font-family: monospace;">${donor.id || donor.donorId || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Name</span>
          <span class="info-value">${donor.name}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value">${donor.email || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Phone</span>
          <span class="info-value">${donor.phone || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Blood Group</span>
          <span class="badge blood">${donor.bloodgroup || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Type</span>
          <span class="badge ${donor.type === 'Blood' ? 'blood' : 'organ'}">${donor.type || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">City</span>
          <span class="info-value">${donor.city || 'N/A'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Registered</span>
          <span class="info-value">${donor.registeredOn || 'N/A'}</span>
        </div>
      </div>

      <!-- Statistics -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${donatedCount}</div>
          <div class="stat-label">Times Donated</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${receivedCount}</div>
          <div class="stat-label">Times Received</div>
        </div>
      </div>
    `;

    // Blood Donation History
    if (donatedCount > 0 && donatedDetail.length > 0) {
      html += `
        <div class="card">
          <div class="card-title">🩸 Blood Donation History</div>
      `;
      donatedDetail.forEach((item, idx) => {
        html += `
          <div class="history-item">
            <div class="history-header">
              <div class="history-type">Blood Group: ${item.bloodGroup || donor.bloodgroup || 'N/A'}</div>
              <div class="history-date">${item.date ? new Date(item.date).toLocaleDateString() : donor.registeredOn || 'N/A'}</div>
            </div>
            <div class="history-details">
              ${item.recipient ? `<div>Recipient: ${item.recipient}</div>` : ''}
              ${item.hospital ? `<div>Hospital: ${item.hospital}</div>` : ''}
              ${item.notes && item.notes !== 'None yet' ? `<div>Details: ${item.notes}</div>` : ''}
            </div>
          </div>
        `;
      });
      html += `</div>`;
    } else if (donatedCount === 0) {
      html += `
        <div class="card">
          <div class="card-title">🩸 Blood Donation History</div>
          <div class="empty-state" style="padding: 20px;">
            <div>No donations yet</div>
            <div style="font-size: 12px; margin-top: 10px;">Visit a blood bank to make your first donation</div>
          </div>
        </div>
      `;
    }

    // Blood Received History
    if (receivedCount > 0 && receivedDetail.length > 0) {
      html += `
        <div class="card">
          <div class="card-title">🏥 Blood Received History</div>
      `;
      receivedDetail.forEach((item) => {
        html += `
          <div class="history-item">
            <div class="history-header">
              <div class="history-type">Blood Group: ${item.bloodGroup || donor.bloodgroup || 'N/A'}</div>
              <div class="history-date">${item.date ? new Date(item.date).toLocaleDateString() : donor.registeredOn || 'N/A'}</div>
            </div>
            <div class="history-details">
              ${item.donor ? `<div>Donor: ${item.donor}</div>` : ''}
              ${item.hospital ? `<div>Hospital: ${item.hospital}</div>` : ''}
              ${item.reason ? `<div>Reason: ${item.reason}</div>` : ''}
              ${item.notes && item.notes !== 'None yet' ? `<div>Details: ${item.notes}</div>` : ''}
            </div>
          </div>
        `;
      });
      html += `</div>`;
    } else if (receivedCount === 0) {
      html += `
        <div class="card">
          <div class="card-title">🏥 Blood Received History</div>
          <div class="empty-state" style="padding: 20px;">
            <div>No blood received</div>
          </div>
        </div>
      `;
    }

    // Organ Information
    if (donor.organs) {
      const organs = donor.organs.split(',').map(o => o.trim());
      html += `
        <div class="card">
          <div class="card-title">🫀 Registered Organs</div>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
      `;
      organs.forEach(organ => {
        html += `<span class="badge organ">${organ}</span>`;
      });
      html += `
          </div>
        </div>
      `;
    }

    document.getElementById('recordsContent').innerHTML = html;
  }

  // Display multiple donor summary cards when several records match the user's email
  function displayMultipleRecords(donors) {
    let html = `
      <div class="card">
        <div class="card-title">Multiple Matches Found</div>
        <div style="font-size: 13px; color: var(--muted);">Select the donor record that matches your registered email or phone number.</div>
      </div>
    `;

    donors.forEach(d => {
      const id = d.donorId || d.id || '';
      const blood = d.bloodgroup || 'N/A';
      const type = d.type || 'N/A';
      const city = d.city || 'N/A';
      const registered = d.registeredOn || d.registered_on || 'N/A';

      html += `
        <div class="card">
          <div class="info-row">
            <span class="info-label">Reference ID</span>
            <span class="info-value" style="color: var(--cyan); font-family: monospace;">${id}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Name</span>
            <span class="info-value">${d.name || 'Unknown'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value">${d.email || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Phone</span>
            <span class="info-value">${d.phone || 'N/A'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Blood Group</span>
            <span class="badge blood">${blood}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Type</span>
            <span class="info-value">${type}</span>
          </div>
          <div class="info-row">
            <span class="info-label">City</span>
            <span class="info-value">${city}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Registered</span>
            <span class="info-value">${registered}</span>
          </div>
          <div style="text-align: right; margin-top: 8px;">
            <button onclick="selectDonor('${id}')" style="background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer;">View</button>
          </div>
        </div>
      `;
    });

    document.getElementById('recordsContent').innerHTML = html;
  }

  // When user selects a donor card, set userId and load that donor's full records
  function selectDonor(donorId) {
    if (!donorId) return;
    localStorage.setItem('userId', donorId);
    loadRecords();
  }

  function navTo(page) {
    switch(page) {
      case 'index':
        window.location.href = 'index.html';
        break;
      case 'map':
        window.location.href = 'bloodbanks.html';
        break;
      case 'records':
        window.location.href = 'records.html';
        break;
      case 'settings':
        window.location.href = 'settings.html';
        break;
    }
  }

window.addEventListener('DOMContentLoaded', loadRecords);

</body>
</html>
